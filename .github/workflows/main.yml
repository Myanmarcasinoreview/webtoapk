name: Build Android App

on:
  repository_dispatch:
    types: [build_app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Update App Name and Website URL
        run: |
          # strings.xml ထဲက Placeholder တွေကို အစားထိုးခြင်း
          sed -i "s|PlaceholderName|${{ github.event.client_payload.app_name }}|g" app/src/main/res/values/strings.xml
          sed -i "s|https://example.com|${{ github.event.client_payload.url }}|g" app/src/main/res/values/strings.xml

      - name: Replace App Icon (Logo)
        run: |
          # Telegram ကနေလာတဲ့ ပုံကို App Icon နေရာမှာ အစားထိုးခြင်း
          curl -L "${{ github.event.client_payload.logo_url }}" -o app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > release.jks

      - name: Build APK & AAB (Release)
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK & AAB to Telegram
        run: |
          # APK ဖိုင်ပို့ရန်
          curl -v -F document=@app/build/outputs/apk/release/app-release.apk \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&caption=✅ APK Build Success for ${{ github.event.client_payload.app_name }}"

          # AAB ဖိုင်ပို့ရန် (Play Store အတွက်)
          curl -v -F document=@app/build/outputs/bundle/release/app-release.aab \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&caption=📦 AAB (Signed) for Play Store"
