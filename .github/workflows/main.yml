name: Build Android App
on:
  repository_dispatch:
    types: [build_app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Gradle Wrapper Jar
        run: |
          mkdir -p gradle/wrapper
          curl -L https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Update App Name and Website URL
        run: |
          sed -i "s|PlaceholderName|${{ github.event.client_payload.app_name }}|g" app/src/main/res/values/strings.xml
          sed -i "s|https://example.com|${{ github.event.client_payload.url }}|g" app/src/main/res/values/strings.xml

      - name: Replace App Icon (Logo)
        run: |
          sudo apt-get install -y imagemagick
          mkdir -p app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          
          # ပုံကို Download ဆွဲပြီး Standard PNG အဖြစ် ပြောင်းလဲခြင်း
          curl -L "${{ github.event.client_payload.logo_url }}" -o temp_logo.png
          convert temp_logo.png -resize 512x512 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          
          # အခြား Size များသို့ ကူးထည့်ခြင်း
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: Decode Keystore File
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > release.jks

      - name: Build APK & AAB (Release)
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease :app:assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK to Telegram
        run: |
          curl -v -F document=@app/build/outputs/apk/release/app-release.apk \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&caption=✅ APK Success: ${{ github.event.client_payload.app_name }}"
